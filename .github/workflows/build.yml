name: Build

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  swift:
    name: Swift tests (container)
    runs-on: ubuntu-latest
    container:
      image: swift:6.0.0-jammy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Test
        run: make test

  macos:
    name: macOS packaging
    needs: swift
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build universal DMG
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          UNIVERSAL=1 make dmg

      - name: Upload DMG artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: Tickeys-Swift.dmg
          path: .build/dmg/Tickeys-Swift.dmg
